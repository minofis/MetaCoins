<h1>{{username}} coins:</h1>

<a *ngIf="isOwner" [routerLink]="['/' + username + '/wallet/coins/create']">Create a new coin</a>
<hr>

<ng-container *ngIf = "coins$ | async as coins">
    <div *ngFor = "let coin of coins">
        <img src="{{coin.imageUrl}}" alt="" width="100px">
        <br>

        <a [routerLink]="['/' + username + '/wallet/coins', coin.id]">Details</a>

        <hr>
    </div>
</ng-container>
